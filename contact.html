<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Afnan Portfolio</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <header class="glass-nav">
        <nav class="navbar">
            <div class="logo">AFNAN<span class="dot">.</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="game.html">JS App</a></li>
            </ul>
            <div class="nav-controls">
                <button id="darkModeToggle" class="glow-btn">Light Mode</button>
                <div class="hamburger" id="hamburger">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </nav>
    </header>

    <main class="contact-container fade-in">
        <div class="profile-header" style="text-align: center; margin-bottom: 3rem;">
            <h1 class="gradient-text" style="font-size: 3.5rem;">Initialize Connection.</h1>
            <p class="section-subtitle" style="color: var(--text-muted); font-size: 1.2rem;">Have a project in mind or want to collaborate? Send a transmission.</p>
        </div>
        
        <div class="form-wrapper glass-panel interactive-card">
            <form id="contactForm" class="neo-form" novalidate>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="e.g., Muhammad Afnan" class="neo-input">
                    <span class="error-msg" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="e.g., afnan@iot-domain.com" class="neo-input">
                    <span class="error-msg" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Secure Password (Min 8 chars, 1 Uppercase, 1 Number)</label>
                    <input type="password" id="password" placeholder="Enter secure passphrase" class="neo-input">
                    <span class="error-msg" id="passwordError"></span>
                </div>

                <div class="form-group row-group">
                    <div class="half-width">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" class="neo-input">
                        <span class="error-msg" id="dobError"></span>
                    </div>
                    <div class="half-width">
                        <label for="gender">Gender</label>
                        <select id="gender" class="neo-input">
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                        <span class="error-msg" id="genderError"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="profilePhoto">Upload Identity Module (JPG/PNG only)</label>
                    <input type="file" id="profilePhoto" accept=".jpg, .jpeg, .png" class="neo-input file-input">
                    <span class="error-msg" id="photoError"></span>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="terms" class="neo-checkbox">
                    <label for="terms">I verify this transmission and agree to the Data Policies.</label>
                    <span class="error-msg block-error" id="termsError"></span>
                </div>

                <button type="submit" class="btn primary-btn submit-btn" style="width: 100%; margin-top: 1rem; font-size: 1.1rem; padding: 16px;">Transmit Data</button>
                <div id="successMessage" class="success-msg hidden">Transmission successful! Systems updated.</div>
            </form>
        </div>
    </main>

    <footer class="glass-footer">
        <div class="footer-content" style="text-align: center; padding: 2rem;">
            <p>&copy; 2026 Muhammad Afnan. DFI20433 Web Development.</p>
            <button id="backToTop" class="hidden glow-btn" style="position: fixed; bottom: 20px; right: 20px;">↑</button>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
